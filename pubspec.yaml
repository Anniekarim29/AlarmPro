name: alarm_pro
description: "AlarmPro — the alarm clock where snoozing costs you."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  just_audio: ^0.9.36
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.0
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
